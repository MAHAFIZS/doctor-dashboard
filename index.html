<!DOCTYPE html>
<html>
<head>
  <title>Doctor Availability Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f7fa;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      vertical-align: top;
    }

    th {
      background: #2c7be5;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f6ff;
    }
  </style>
</head>

<body>

<h1>Doctor Availability Dashboard</h1>

<table id="dashboard"></table>

<script>
  // 🔴 PASTE YOUR GOOGLE SHEET CSV LINK HERE
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxG5LxY8yTO-WQvgxga47qIE_3JQYcuiRyo1wTskMcDRfiSVsKCZ1KPjQoHFmO4uTHbMettWKlyj1_/pub?gid=1707988883&single=true&output=csv";

  fetch(csvUrl)
    .then(response => response.text())
    .then(data => {
      const rows = data.split("\n").map(row => row.split(","));
      const table = document.getElementById("dashboard");

      rows.forEach((row, index) => {
        const tr = document.createElement("tr");

        row.forEach(cell => {
          const el = document.createElement(index === 0 ? "th" : "td");
          el.textContent = cell;
          tr.appendChild(el);
        });

        table.appendChild(tr);
      });
    });
</script>

</body>
</html>
